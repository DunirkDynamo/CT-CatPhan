name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows-executable:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build executable
        shell: pwsh
        run: .\scripts\build_executable.ps1 -InstallBuildTool -Clean

      - name: Rename executable for release
        id: package
        shell: pwsh
        run: |
          $assetName = "CT-CatPhan-${{ github.ref_name }}.exe"
          Rename-Item -Path 'dist/CT-CatPhan.exe' -NewName $assetName
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/${{ steps.package.outputs.asset_name }}
          fail_on_unmatched_files: true